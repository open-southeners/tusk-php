name: Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Derive release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not contain a valid semantic version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Sync release version into extension manifests
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix editors/vscode version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i -E '0,/^version = ".*"$/s//version = "'"$VERSION"'"/' editors/zed/Cargo.toml
          sed -i -E '0,/^version = ".*"$/s//version = "'"$VERSION"'"/' editors/zed/extension.toml

      - name: Get release info
        id: query-release-info
        uses: release-flow/keep-a-changelog-action@v3
        with:
          command: query
          changelog: CHANGELOG.md
          version: ${{ steps.version.outputs.value }}

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p "dist/tusk-php-zed-${VERSION}"

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            IFS='/' read -r goos goarch <<< "$target"
            output="dist/tusk-php-${goos}-${goarch}"
            if [[ "$goos" == "windows" ]]; then
              output+=".exe"
            fi
            echo "Building ${goos}/${goarch}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -ldflags="-s -w -X main.version=${VERSION}" -trimpath -o "$output" ./cmd/tusk-php/
          done

          # Bundle platform binaries into the VSCode extension
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            IFS='/' read -r goos goarch <<< "$target"
            ext=""
            if [[ "$goos" == "windows" ]]; then ext=".exe"; fi
            vscode_dir="editors/vscode/bin/${goos}-${goarch}"
            mkdir -p "$vscode_dir"
            cp "dist/tusk-php-${goos}-${goarch}${ext}" "${vscode_dir}/php-lsp${ext}"
          done

          npm --prefix editors/vscode install
          npm --prefix editors/vscode run compile
          cp README.md editors/vscode/README.md
          cp CHANGELOG.md editors/vscode/CHANGELOG.md
          cp LICENSE editors/vscode/LICENSE
          (
            cd editors/vscode
            npx --yes @vscode/vsce package \
              --out "../../dist/tusk-php-vscode-${VERSION}.vsix"
          )

          cargo build \
            --manifest-path editors/zed/Cargo.toml \
            --target wasm32-wasip1 \
            --release

          cp editors/zed/extension.toml "dist/tusk-php-zed-${VERSION}/"
          cp editors/zed/Cargo.toml "dist/tusk-php-zed-${VERSION}/"
          cp editors/zed/Cargo.lock "dist/tusk-php-zed-${VERSION}/"
          cp editors/zed/target/wasm32-wasip1/release/tusk_php_zed.wasm "dist/tusk-php-zed-${VERSION}/"
          (
            cd dist
            zip -r "tusk-php-zed-${VERSION}.zip" "tusk-php-zed-${VERSION}"
          )

      - name: Publish to Github releases
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.query-release-info.outputs.release-notes }}
          files: |
            dist/tusk-php-linux-amd64
            dist/tusk-php-linux-arm64
            dist/tusk-php-darwin-amd64
            dist/tusk-php-darwin-arm64
            dist/tusk-php-windows-amd64.exe
            dist/tusk-php-vscode-${{ steps.version.outputs.value }}.vsix
            dist/tusk-php-zed-${{ steps.version.outputs.value }}.zip

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: env.VSCE_PAT != ''
        run: |
          npx --yes @vscode/vsce publish \
            --packagePath "dist/tusk-php-vscode-${{ steps.version.outputs.value }}.vsix"

      - name: Publish to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: env.OVSX_PAT != ''
        run: |
          npx --yes ovsx publish \
            "dist/tusk-php-vscode-${{ steps.version.outputs.value }}.vsix" \
            -p "$OVSX_PAT"
