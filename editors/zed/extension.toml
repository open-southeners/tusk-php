id = "tusk-php"
name = "Tusk PHP"
version = "0.2.0"
schema_version = 1
description = "High-performance PHP 8.5+ language server with Laravel & Symfony container-aware intelligence"
repository = "https://github.com/open-southeners/tusk-php"
authors = ["Open Southeners"]
themes = []
icon_themes = []
languages = []
capabilities = []

[lib]
kind = "Rust"
version = "0.7.0"

[language_servers.tusk-php]
language = "PHP"
languages = []

[language_servers.tusk-php.language_ids]
PHP = "php"

[context_servers]

[agent_servers]

[slash_commands]

[slash_commands.tusk-copy-namespace]
description = "Show the declared namespace or FQN for a PHP file"
requires_argument = true

[slash_commands.tusk-namespace-for-path]
description = "Show the expected namespace for a PHP file path using composer.json PSR-4"
requires_argument = true
